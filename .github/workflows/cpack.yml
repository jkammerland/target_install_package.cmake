name: CPack Integration Testing

on:
  push:
    branches: [ "integration", "master", "CPack-integration" ]
  pull_request:
    branches: [ "integration", "master" ]
  workflow_dispatch:

jobs:
  cpack-basic:
    name: CPack Basic Integration Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            expected_generators: "TGZ;ZIP"
            expected_packages: ["MyLibrary-*.tar.gz", "MyLibrary-*.zip"]
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            expected_generators: "TGZ;DEB;RPM"
            expected_packages: ["MyLibrary-*.tar.gz", "mylibrary-*.deb", "mylibrary-*.rpm"]
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            expected_generators: "TGZ;DragNDrop"
            expected_packages: ["MyLibrary-*.tar.gz", "MyLibrary-*.dmg"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap (packaging tools + gpg)
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            bash ci/run.sh bootstrap --packaging-tools --gpg
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            bash ci/run.sh bootstrap --gpg
          fi

      - name: Run CPack basic suite
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh cpack --suite basic --build-type "${{ matrix.build_type }}" \
            --cc "${{ matrix.c_compiler }}" --cxx "${{ matrix.cpp_compiler }}"

      - name: Upload CPack Artifacts with GPG Signatures
        uses: actions/upload-artifact@v4
        if: matrix.build_type == 'Release'
        with:
          name: cpack-packages-signed-${{ matrix.os }}
          path: |
            examples/cpack-basic/build/*.tar.gz
            examples/cpack-basic/build/*.zip
            examples/cpack-basic/build/*.deb
            examples/cpack-basic/build/*.rpm
            examples/cpack-basic/build/*.dmg
            examples/cpack-basic/build/*.sig
            examples/cpack-basic/build/*.sha256
            examples/cpack-basic/build/*.sha512
            examples/cpack-basic/build/verify.sh
          retention-days: 7

  cpack-components:
    name: CPack Components Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap (packaging tools)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap --packaging-tools

      - name: Run CPack components suite
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh cpack --suite components

  cpack-cross-platform:
    name: CPack Cross-Platform Package and Signature Validation
    runs-on: ubuntu-latest
    needs: [cpack-basic]
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap (gpg)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap --gpg

      - name: Download All Platform Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Analyze Cross-Platform Package and Signature Consistency
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh cpack --suite cross-platform --artifacts-dir ./artifacts

  cpack-regression:
    name: CPack Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CPack regression suite
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh cpack --suite regression

