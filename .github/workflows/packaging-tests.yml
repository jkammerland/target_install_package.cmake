name: Packaging Tests

on:
  push:
    branches: [ "master", "test-packaging" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-test-packages:
    name: Build and Test Packages on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            container_runtime: docker
            architectures_to_test: [amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap (packaging tools)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap --packaging-tools

      - name: Build + verify + test packages
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh packaging-tests

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: |
            build/packaging/packages/*.deb
            build/packaging/packages/*.rpm
            build/packaging/packages/*.tar.gz
          retention-days: 7

  test-multi-arch:
    name: Test Multi-Architecture Support
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Multi-arch detection (CMake)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh packaging-tests --mode arch-detection

  summary:
    name: Summary
    needs: [build-and-test-packages, test-multi-arch]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Packaging Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-and-test-packages.result }}" == "success" ]; then
            echo "✅ **Package Build and Tests**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Package Build and Tests**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.test-multi-arch.result }}" == "success" ]; then
            echo "✅ **Multi-Architecture Detection**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Multi-Architecture Detection**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
