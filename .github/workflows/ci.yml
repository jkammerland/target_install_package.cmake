name: CMake Target Install Package CI

on:
  push:
    branches: [ "integration", "master" ]
  pull_request:
    branches: [ "integration", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.c_compiler }} / ${{ matrix.build_type }}${{ matrix.compiler_variant && format(' / {0}', matrix.compiler_variant) || '' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release, MinSizeRel, RelWithDebInfo]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            compiler_variant: appleclang
          - os: macos-latest
            c_compiler: /opt/homebrew/opt/llvm/bin/clang
            cpp_compiler: /opt/homebrew/opt/llvm/bin/clang++
            compiler_variant: homebrew
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: clang
          # Skip MinSizeRel with GCC 14 due to C++ modules template instantiation issues with -Os
          - os: ubuntu-latest
            c_compiler: gcc
            build_type: MinSizeRel

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Homebrew Clang (macOS)
        if: runner.os == 'macOS' && matrix.compiler_variant == 'homebrew'
        run: |
          brew install llvm
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Derive build directory suffix
        id: dirs
        shell: bash
        run: |
          set -euo pipefail
          bt="${{ matrix.build_type }}"
          case "${bt}" in
            Debug) dir=debug ;;
            Release) dir=release ;;
            MinSizeRel) dir=minsizerel ;;
            RelWithDebInfo) dir=relwithdebinfo ;;
            *) echo "Unsupported build type: ${bt}" >&2; exit 1 ;;
          esac
          echo "build-dir-suffix=${dir}" >> "${GITHUB_OUTPUT}"

      - name: Bootstrap (Ninja + fmt)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap \
            --ninja \
            --fmt \
            --build-type "${{ matrix.build_type }}" \
            --cc "${{ matrix.c_compiler }}" \
            --cxx "${{ matrix.cpp_compiler }}"

      - name: Main build/test/install
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh main \
            --build-type "${{ matrix.build_type }}" \
            --cc "${{ matrix.c_compiler }}" \
            --cxx "${{ matrix.cpp_compiler }}"

      - name: Consumer build/run
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh consumer \
            --build-type "${{ matrix.build_type }}" \
            --cc "${{ matrix.c_compiler }}" \
            --cxx "${{ matrix.cpp_compiler }}"

      - name: Upload Installation Artifacts
        uses: actions/upload-artifact@v4
        if: matrix.build_type == 'Release' && (matrix.c_compiler == 'gcc' || matrix.compiler_variant == 'appleclang')
        with:
          name: target-install-package-${{ matrix.os }}-${{ matrix.build_type }}-${{ matrix.compiler_variant || 'gcc' }}
          path: |
            build/ci/${{ steps.dirs.outputs.build-dir-suffix }}/install
            build/ci-deps/fmt-install
            !build/ci/${{ steps.dirs.outputs.build-dir-suffix }}/install/**/*.pdb
            !build/ci-deps/fmt-install/**/*.pdb
          retention-days: 7

  test-integration:
    name: Integration (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap (Ninja + fmt)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap --ninja --fmt --build-type Release

      - name: Download Installation Artifacts
        uses: actions/download-artifact@v4
        with:
          name: target-install-package-ubuntu-latest-Release-gcc
          path: install-artifacts

      - name: Integration tests (FetchContent + install prefix)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh consumer \
            --suite integration \
            --install-prefix install-artifacts/install

  test-examples:
    name: Examples (${{ matrix.os }} / ${{ matrix.build_type }} / ${{ matrix.config_mode }}${{ matrix.compiler_variant && format(' / {0}', matrix.compiler_variant) || '' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]
        config_mode: [single, multi]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc-14
            cpp_compiler: g++-14
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            compiler_variant: appleclang
          - os: macos-latest
            c_compiler: /opt/homebrew/opt/llvm/bin/clang
            cpp_compiler: /opt/homebrew/opt/llvm/bin/clang++
            compiler_variant: homebrew

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Modern GCC on Ubuntu (for C++ Modules)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Install Homebrew Clang on macOS (for C++ Modules)
        if: runner.os == 'macOS' && matrix.compiler_variant == 'homebrew'
        run: |
          brew install llvm
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Bootstrap (Ninja)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap --ninja

      - name: Examples (single-config)
        if: matrix.config_mode == 'single'
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh examples \
            --suite single \
            --build-type "${{ matrix.build_type }}" \
            --cc "${{ matrix.c_compiler }}" \
            --cxx "${{ matrix.cpp_compiler }}" \
            --use-fetchcontent

      - name: Examples (multi-config)
        if: matrix.config_mode == 'multi'
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh examples \
            --suite multi \
            --build-type "${{ matrix.build_type }}" \
            --cc "${{ matrix.c_compiler }}" \
            --cxx "${{ matrix.cpp_compiler }}" \
            --use-fetchcontent

  multi-config-consume:
    name: Multi-config consume (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap (Ninja)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap --ninja

      - name: Consume suite (multi-config)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh examples --suite consume-multi-config

  single-config-consume:
    name: Single-config consume (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap (Ninja)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap --ninja

      - name: Consume suite (single-config)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh examples --suite consume-single-config

  fhs-combined-consume:
    name: FHS combined consume (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap (Ninja)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh bootstrap --ninja

      - name: Consume suite (FHS combined)
        shell: bash
        run: |
          set -euxo pipefail
          bash ci/run.sh examples --suite consume-fhs-combined
